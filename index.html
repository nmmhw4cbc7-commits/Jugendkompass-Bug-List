<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Satisfy&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg:      #0e0e0e;
      --surface: #161616;
      --border:  rgba(255,255,255,0.08);
      --text:    #e8e4dc;
      --muted:   rgba(232,228,220,0.38);
      --accent:  #c9a96e;
      --danger:  #c0574f;
      --radius:  12px;
      --grid:    64px;
    }
 
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: var(--grid) var(--grid);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 16px 100px;
    }
 
    header {
      width: 100%;
      max-width: 540px;
      margin-bottom: 36px;
      text-align: center;
    }
 
    header h1 {
      font-family: 'Satisfy', cursive;
      font-size: 52px;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 0.5px;
      line-height: 1.1;
      text-shadow: 0 2px 32px rgba(201,169,110,0.3);
    }
 
    header p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 17px;
      color: var(--muted);
      margin-top: 10px;
    }
 
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(201,169,110,0.07);
      border: 1px solid rgba(201,169,110,0.18);
      border-radius: 99px;
      padding: 4px 12px;
      font-size: 10.5px;
      color: var(--accent);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
 
    .live-dot {
      width: 6px; height: 6px;
      background: #4caf7d;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
 
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(76,175,125,0.5); }
      50%       { opacity: 0.7; box-shadow: 0 0 0 4px rgba(76,175,125,0); }
    }
 
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 8px 48px rgba(0,0,0,0.6);
      width: 100%;
      max-width: 540px;
      overflow: hidden;
    }
 
    .input-row {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }
 
    #item-input {
      flex: 1;
      border: none;
      outline: none;
      padding: 18px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: transparent;
      caret-color: var(--accent);
    }
 
    #item-input::placeholder { color: var(--muted); }
 
    #add-btn {
      border: none;
      outline: none;
      background: transparent;
      padding: 18px 22px;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
    }
 
    #add-btn:hover { color: var(--accent); background: rgba(201,169,110,0.07); }
    #add-btn svg { width: 20px; height: 20px; }
 
    #list { list-style: none; min-height: 72px; }
 
    .item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 20px;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.22s cubic-bezier(0.22,1,0.36,1) forwards;
      transition: background 0.12s;
    }
 
    .item:last-child { border-bottom: none; }
    .item:hover { background: rgba(255,255,255,0.02); }
 
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    .item.removing { animation: fadeOut 0.18s ease forwards; }
 
    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(10px); }
    }
 
    .item-bullet {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.45;
      flex-shrink: 0;
    }
 
    .item-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 19px;
      line-height: 1.4;
      flex: 1;
      word-break: break-word;
    }
 
    .item-time {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
 
    .delete-btn {
      border: none;
      background: none;
      cursor: pointer;
      color: transparent;
      padding: 5px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
 
    .item:hover .delete-btn { color: var(--muted); }
    .delete-btn:hover { color: var(--danger) !important; background: rgba(192,87,79,0.1); }
    .delete-btn svg { width: 13px; height: 13px; }
 
    #empty {
      padding: 52px 20px;
      text-align: center;
      color: var(--muted);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 18px;
    }
 
    #status {
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 14px;
      width: 100%;
      max-width: 540px;
      text-align: center;
      min-height: 18px;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
 
  <header>
    <div class="live-badge"><span class="live-dot"></span> Live</div>
    <h1>Shared List</h1>
    <p>Everything you add appears for everyone, instantly.</p>
  </header>
 
  <div class="card">
    <div class="input-row">
      <input id="item-input" type="text" placeholder="Add something to the list…" maxlength="280" autocomplete="off" />
      <button id="add-btn" title="Add item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
    <ul id="list">
      <li id="empty">Nothing here yet — be the first to add something.</li>
    </ul>
  </div>
 
  <div id="status"></div>
 
<script>
  /* ── 🔧 YOUR SUPABASE CREDENTIALS ── */
  const SUPABASE_URL      = 'https://nremajubzoyjtavhucpc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yZW1hanViem95anRhdmh1Y3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MDk3MTYsImV4cCI6MjA5NDM4NTcxNn0.o_3d6WmibSxGH898Hd7L8xMgJv9aMGCk_vimnwl9-hk';
  /* ─────────────────────────────────── */
 
  const $   = id => document.getElementById(id);
  const fmt = ts => new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
 
  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let channel;
 
  document.addEventListener('DOMContentLoaded', async () => {
    await loadItems();
    subscribeRealtime();
    $('add-btn').addEventListener('click', addItem);
    $('item-input').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
  });
 
  async function loadItems() {
    const { data, error } = await client.from('items').select('*').order('created_at', { ascending: true });
    if (error) return setStatus('Could not load items: ' + error.message);
    renderAll(data || []);
  }
 
  function renderAll(items) {
    const list = $('list');
    list.innerHTML = '';
    if (!items.length) {
      list.innerHTML = '<li id="empty">Nothing here yet — be the first to add something.</li>';
      return;
    }
    items.forEach(item => list.appendChild(makeRow(item)));
  }
 
  function makeRow(item) {
    const li = document.createElement('li');
    li.className = 'item';
    li.dataset.id = item.id;
    li.innerHTML = `
      <span class="item-bullet"></span>
      <span class="item-text">${esc(item.text)}</span>
      <span class="item-time">${fmt(item.created_at)}</span>
      <button class="delete-btn" title="Remove">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>`;
    li.querySelector('.delete-btn').addEventListener('click', () => deleteItem(item.id, li));
    return li;
  }
 
  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
 
  async function addItem() {
    const input = $('item-input');
    const text  = input.value.trim();
    if (!text) return;
    input.value = '';
    setStatus('Saving…');
    const { error } = await client.from('items').insert({ text });
    if (error) { setStatus('Error: ' + error.message); input.value = text; }
    else setStatus('');
  }
 
  async function deleteItem(id, li) {
    li.classList.add('removing');
    await new Promise(r => setTimeout(r, 180));
    const { error } = await client.from('items').delete().eq('id', id);
    if (error) { li.classList.remove('removing'); setStatus('Delete failed: ' + error.message); }
  }
 
  function subscribeRealtime() {
    channel = client
      .channel('items-changes')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'items' }, ({ new: item }) => {
        const e = $('empty'); if (e) e.remove();
        $('list').appendChild(makeRow(item));
      })
      .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'items' }, ({ old: item }) => {
        const el = document.querySelector(`[data-id="${item.id}"]`);
        if (el) el.remove();
        if (!$('list').children.length)
          $('list').innerHTML = '<li id="empty">Nothing here yet — be the first to add something.</li>';
      })
      .subscribe();
  }
 
  let _t;
  function setStatus(msg, ms = 2500) {
    $('status').textContent = msg;
    clearTimeout(_t);
    if (msg && ms) _t = setTimeout(() => $('status').textContent = '', ms);
  }
</script>
</body>
</html>
