<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jugendkompass To Do Liste</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg:       #070d16;
      --surface:  #0c1524;
      --surface2: #101d30;
      --border:   #1a2e4a;
      --text:     #c8d8ea;
      --muted:    #4a6480;
      --accent:   #3b82f6;
      --accent2:  #60a5fa;
      --danger:   #ef4444;
      --green:    #22c55e;
      --radius:   6px;
    }
 
    body {
      font-family: 'JetBrains Mono', monospace;
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 16px 100px;
    }
 
    /* ── header ── */
    header {
      width: 100%;
      max-width: 600px;
      margin-bottom: 32px;
    }
 
    .term-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 10px 16px;
    }
 
    .term-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }
    .term-dot.r { background: #ef4444; }
    .term-dot.y { background: #374151; }
    .term-dot.g { background: #22c55e; }
 
    .term-title {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
 
    .header-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px 24px 20px;
    }
 
    .prompt-line {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }
 
    .prompt-line span { color: var(--accent); }
 
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: -0.5px;
    }
 
    h1 .prefix { color: var(--muted); font-weight: 300; }
 
    .meta-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 10px;
    }
 
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
    }
 
    .badge.live .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 1.5s ease-in-out infinite;
    }
 
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
 
    /* ── card ── */
    .card {
      width: 100%;
      max-width: 600px;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(59,130,246,0.05);
    }
 
    /* ── input ── */
    .input-row {
      display: flex;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
 
    .input-prefix {
      display: flex;
      align-items: center;
      padding: 0 0 0 16px;
      font-size: 13px;
      color: var(--accent);
      user-select: none;
      flex-shrink: 0;
    }
 
    #item-input {
      flex: 1;
      border: none;
      outline: none;
      padding: 16px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text);
      background: transparent;
      caret-color: var(--accent2);
    }
 
    #item-input::placeholder { color: var(--muted); }
 
    #add-btn {
      border: none;
      outline: none;
      background: transparent;
      padding: 0 18px;
      cursor: pointer;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      display: flex;
      align-items: center;
      transition: color 0.12s, background 0.12s;
      border-left: 1px solid var(--border);
    }
 
    #add-btn:hover { color: var(--accent2); background: rgba(59,130,246,0.08); }
 
    /* ── list ── */
    #list { list-style: none; background: var(--surface); }
 
    .item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.18s ease forwards;
      transition: background 0.1s;
    }
 
    .item:last-child { border-bottom: none; }
    .item:hover { background: var(--surface2); }
 
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: translateX(0); }
    }
 
    .item.removing { animation: fadeOut 0.15s ease forwards; }
 
    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(8px); }
    }
 
    .item-index {
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
      padding-top: 2px;
      min-width: 28px;
    }
 
    .item-text {
      font-size: 13px;
      line-height: 1.55;
      flex: 1;
      word-break: break-word;
      color: var(--text);
    }
 
    .item-time {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
      padding-top: 3px;
    }
 
    .delete-btn {
      border: none;
      background: none;
      cursor: pointer;
      color: transparent;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 3px;
      transition: color 0.12s, background 0.12s;
      flex-shrink: 0;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1;
    }
 
    .item:hover .delete-btn { color: var(--muted); }
    .delete-btn:hover { color: var(--danger) !important; background: rgba(239,68,68,0.1); }
 
    #empty {
      padding: 48px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.3px;
    }
 
    #empty span { color: var(--accent); }
 
    #status {
      font-size: 11px;
      color: var(--muted);
      margin-top: 12px;
      width: 100%;
      max-width: 600px;
      text-align: left;
      min-height: 16px;
      padding-left: 2px;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
 
  <header>
    <div class="term-bar">
      <span class="term-dot r"></span>
      <span class="term-dot y"></span>
      <span class="term-dot g"></span>
      <span class="term-title">jugendkompass — bug-liste.html</span>
    </div>
    <div class="header-box">
      <div class="prompt-line"><span>~/jugendkompass</span> $ open bug-liste</div>
      <h1><span class="prefix">// </span>Jugendkompass To Do Liste</h1>
      <div class="meta-row">
        <span class="badge live"><span class="dot"></span> live sync</span>
        <span class="badge">shared · realtime</span>
      </div>
    </div>
  </header>
 
  <div class="card">
    <div class="input-row">
      <span class="input-prefix">&gt;_</span>
      <input id="item-input" type="text" placeholder="neuen bug eintragen…" maxlength="280" autocomplete="off" />
      <button id="add-btn" title="Hinzufügen">+</button>
    </div>
    <ul id="list">
      <li id="empty">// keine einträge — <span>ersten bug melden ↑</span></li>
    </ul>
  </div>
 
  <div id="status"></div>
 
<script>
  /* ── 🔧 SUPABASE CREDENTIALS ── */
  const SUPABASE_URL      = 'https://nremajubzoyjtavhucpc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yZW1hanViem95anRhdmh1Y3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MDk3MTYsImV4cCI6MjA5NDM4NTcxNn0.o_3d6WmibSxGH898Hd7L8xMgJv9aMGCk_vimnwl9-hk';
  /* ───────────────────────────── */
 
  const $   = id => document.getElementById(id);
  const fmt = ts => new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
 
  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let channel;
 
  document.addEventListener('DOMContentLoaded', async () => {
    await loadItems();
    subscribeRealtime();
    $('add-btn').addEventListener('click', addItem);
    $('item-input').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
  });
 
  async function loadItems() {
    const { data, error } = await client.from('items').select('*').order('created_at', { ascending: true });
    if (error) return setStatus('[error] ' + error.message);
    renderAll(data || []);
  }
 
  function renderAll(items) {
    const list = $('list');
    list.innerHTML = '';
    if (!items.length) {
      list.innerHTML = '<li id="empty">// keine einträge — <span>ersten bug melden ↑</span></li>';
      return;
    }
    items.forEach((item, i) => list.appendChild(makeRow(item, i + 1)));
  }
 
  function makeRow(item, index) {
    const li = document.createElement('li');
    li.className = 'item';
    li.dataset.id = item.id;
    const idx = index ?? $('list').children.length + 1;
    li.innerHTML = `
      <span class="item-index">#${String(idx).padStart(2,'0')}</span>
      <span class="item-text">${esc(item.text)}</span>
      <span class="item-time">${fmt(item.created_at)}</span>
      <button class="delete-btn" title="Löschen">✕</button>`;
    li.querySelector('.delete-btn').addEventListener('click', () => deleteItem(item.id, li));
    return li;
  }
 
  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
 
  async function addItem() {
    const input = $('item-input');
    const text  = input.value.trim();
    if (!text) return;
    input.value = '';
    setStatus('// saving…');
    const { error } = await client.from('items').insert({ text });
    if (error) { setStatus('[error] ' + error.message); input.value = text; }
    else setStatus('');
  }
 
  async function deleteItem(id, li) {
    li.classList.add('removing');
    await new Promise(r => setTimeout(r, 150));
    const { error } = await client.from('items').delete().eq('id', id);
    if (error) { li.classList.remove('removing'); setStatus('[error] ' + error.message); }
  }
 
  function subscribeRealtime() {
    channel = client
      .channel('items-changes')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'items' }, ({ new: item }) => {
        const e = $('empty'); if (e) e.remove();
        const idx = $('list').children.length + 1;
        $('list').appendChild(makeRow(item, idx));
      })
      .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'items' }, ({ old: item }) => {
        const el = document.querySelector(`[data-id="${item.id}"]`);
        if (el) el.remove();
        if (!$('list').children.length)
          $('list').innerHTML = '<li id="empty">// keine einträge — <span>ersten bug melden ↑</span></li>';
        // re-number
        document.querySelectorAll('.item-index').forEach((el, i) => el.textContent = '#' + String(i+1).padStart(2,'0'));
      })
      .subscribe();
  }
 
  let _t;
  function setStatus(msg, ms = 2500) {
    $('status').textContent = msg;
    clearTimeout(_t);
    if (msg && ms) _t = setTimeout(() => $('status').textContent = '', ms);
  }
</script>
</body>
</html>
