


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jugendkompass To Do Liste</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --accent:  #60a5fa;
      --accent2: #93c5fd;
      --danger:  #f87171;
      --green:   #4ade80;
      --text:    #e2eaf4;
      --muted:   rgba(180,210,240,0.4);
      --border:  rgba(96,165,250,0.15);
      --glass:   rgba(10,25,60,0.55);
      --glass2:  rgba(15,35,80,0.7);
      --radius:  16px;
    }
 
    body {
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 16px 100px;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(29,78,216,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(37,99,235,0.25) 0%, transparent 55%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #030a1a 0%, #060f24 100%);
      background-attachment: fixed;
      color: var(--text);
    }
 
    /* subtle grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(96,165,250,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(96,165,250,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }
 
    header, .card, #status {
      position: relative;
      z-index: 1;
    }
 
    /* ── header ── */
    header {
      width: 100%;
      max-width: 600px;
      margin-bottom: 24px;
      padding: 0 4px;
    }
 
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(96,165,250,0.1);
      border: 1px solid rgba(96,165,250,0.2);
      border-radius: 99px;
      padding: 5px 14px;
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
 
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 1.8s ease-in-out infinite;
    }
 
    @keyframes blink {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--green); }
      50%       { opacity: 0.3; box-shadow: none; }
    }
 
    h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.2;
    }
 
    h1 .prefix {
      color: var(--accent);
      font-weight: 300;
    }
 
    header p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.3px;
    }
 
    /* ── glass card ── */
    .card {
      width: 100%;
      max-width: 600px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      box-shadow:
        0 0 0 1px rgba(96,165,250,0.06),
        0 8px 32px rgba(0,0,0,0.5),
        0 32px 80px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.06);
    }
 
    /* ── input row ── */
    .input-row {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--glass2);
    }
 
    .input-prefix {
      padding: 0 4px 0 18px;
      font-size: 14px;
      color: var(--accent);
      user-select: none;
      flex-shrink: 0;
      opacity: 0.7;
    }
 
    #item-input {
      flex: 1;
      border: none;
      outline: none;
      padding: 18px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text);
      background: transparent;
      caret-color: var(--accent);
    }
 
    #item-input::placeholder { color: var(--muted); }
 
    #add-btn {
      border: none;
      outline: none;
      background: transparent;
      padding: 0 20px;
      height: 100%;
      cursor: pointer;
      color: var(--muted);
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
      border-left: 1px solid var(--border);
      min-height: 54px;
    }
 
    #add-btn:hover {
      color: var(--accent);
      background: rgba(96,165,250,0.08);
    }
 
    /* ── list ── */
    #list { list-style: none; }
 
    .item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.2s cubic-bezier(0.22,1,0.36,1) forwards;
      transition: background 0.12s;
    }
 
    .item:last-child { border-bottom: none; }
 
    .item:hover { background: rgba(96,165,250,0.05); }
 
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    .item.removing { animation: fadeOut 0.15s ease forwards; }
 
    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(10px); }
    }
 
    .item-index {
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
      padding-top: 2px;
      min-width: 28px;
    }
 
    .item-text {
      font-size: 13px;
      line-height: 1.6;
      flex: 1;
      word-break: break-word;
      color: var(--text);
    }
 
    .item-time {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
      padding-top: 2px;
    }
 
    .delete-btn {
      border: none;
      background: none;
      cursor: pointer;
      color: transparent;
      font-size: 13px;
      padding: 2px 5px;
      border-radius: 4px;
      transition: color 0.12s, background 0.12s;
      flex-shrink: 0;
      font-family: 'JetBrains Mono', monospace;
    }
 
    .item:hover .delete-btn { color: var(--muted); }
    .delete-btn:hover { color: var(--danger) !important; background: rgba(248,113,113,0.1); }
 
    #empty {
      padding: 52px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.3px;
    }
 
    #empty span { color: var(--accent); }
 
    /* ── status ── */
    #status {
      font-size: 11px;
      color: var(--muted);
      margin-top: 14px;
      width: 100%;
      max-width: 600px;
      text-align: left;
      min-height: 16px;
      padding-left: 4px;
      letter-spacing: 0.3px;
    }
 
    /* ── floating export button ── */
    #export-btn {
      position: fixed;
      bottom: 32px;
      right: 32px;
      z-index: 100;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(96,165,250,0.3);
      background: rgba(10,25,60,0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--accent);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(96,165,250,0.1);
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    }
    #export-btn:hover {
      transform: scale(1.1);
      background: rgba(96,165,250,0.15);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(96,165,250,0.25);
    }
    #export-btn:active { transform: scale(0.96); }
 
    /* ── github link ── */
    #github-link {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s, transform 0.15s;
      display: flex;
      align-items: center;
    }
    #github-link:hover {
      color: var(--accent);
      transform: translateX(-50%) scale(1.15);
    }
    #github-link svg { width: 22px; height: 22px; }
 
    /* ── print / pdf export ── */
    @media print {
      body {
        background: #fff !important;
        color: #000 !important;
        padding: 32px !important;
        display: block !important;
      }
      body::before { display: none; }
      header { max-width: 100%; margin-bottom: 16px; }
      .live-badge, #export-btn { display: none !important; }
      h1 { color: #000 !important; font-size: 20px; }
      h1 .prefix { color: #555 !important; }
      header p { color: #555 !important; margin-bottom: 16px; }
      .card {
        max-width: 100%;
        background: #fff !important;
        border: 1px solid #ccc !important;
        box-shadow: none !important;
        backdrop-filter: none !important;
      }
      .input-row { display: none !important; }
      .item { border-bottom: 1px solid #eee !important; padding: 10px 14px !important; }
      .item:hover { background: none !important; }
      .item-index { color: #999 !important; }
      .item-text { color: #000 !important; font-size: 12px !important; }
      .item-time { color: #999 !important; }
      .delete-btn { display: none !important; }
      #empty { color: #999 !important; }
      #status { display: none; }
    }
  </style>
</head>
<body>
 
  <header>
    <!-- ÄNDERUNG 1: badges nebeneinander + online zähler -->
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <div class="live-badge"><span class="live-dot"></span> live sync</div>
      <div class="live-badge"><span class="live-dot"></span> <span id="online-count">–</span> online</div>
    </div>
    <h1><span class="prefix">// </span>Jugendkompass To Do Liste</h1>
    <p>geteilte Liste für To Do's und Bugs in der Jugendkompass App</p>
  </header>
 
  <div class="card">
    <div class="input-row">
      <span class="input-prefix">&gt;_</span>
      <input id="item-input" type="text" placeholder="neuen eintrag hinzufügen…" maxlength="280" autocomplete="off" />
      <button id="add-btn" title="Hinzufügen">+</button>
    </div>
    <ul id="list">
      <li id="empty">// keine einträge — <span>ersten eintrag hinzufügen ↑</span></li>
    </ul>
  </div>
 
  <div id="status"></div>
 
<script>
  /* ── 🔧 SUPABASE CREDENTIALS ── */
  const SUPABASE_URL      = 'https://nremajubzoyjtavhucpc.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yZW1hanViem95anRhdmh1Y3BjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MDk3MTYsImV4cCI6MjA5NDM4NTcxNn0.o_3d6WmibSxGH898Hd7L8xMgJv9aMGCk_vimnwl9-hk';
  /* ───────────────────────────── */
 
  const $   = id => document.getElementById(id);
  const fmt = ts => new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
 
  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let channel;
 
  document.addEventListener('DOMContentLoaded', async () => {
    await loadItems();
    subscribeRealtime();
    $('add-btn').addEventListener('click', addItem);
    $('item-input').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
  });
 
  async function loadItems() {
    const { data, error } = await client.from('items').select('*').order('created_at', { ascending: true });
    if (error) return setStatus('[error] ' + error.message);
    renderAll(data || []);
  }
 
  function renderAll(items) {
    const list = $('list');
    list.innerHTML = '';
    if (!items.length) {
      list.innerHTML = '<li id="empty">// keine einträge — <span>ersten eintrag hinzufügen ↑</span></li>';
      return;
    }
    items.forEach((item, i) => list.appendChild(makeRow(item, i + 1)));
  }
 
  function makeRow(item, index) {
    const li = document.createElement('li');
    li.className = 'item';
    li.dataset.id = item.id;
    const idx = index ?? $('list').children.length + 1;
    li.innerHTML = `
      <span class="item-index">#${String(idx).padStart(2,'0')}</span>
      <span class="item-text">${esc(item.text)}</span>
      <span class="item-time">${fmt(item.created_at)}</span>
      <button class="delete-btn" title="Löschen">✕</button>`;
    li.querySelector('.delete-btn').addEventListener('click', () => deleteItem(item.id, li));
    return li;
  }
 
  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
 
  async function addItem() {
    const input = $('item-input');
    const text  = input.value.trim();
    if (!text) return;
    input.value = '';
    setStatus('// saving…');
    const { error } = await client.from('items').insert({ text });
    if (error) { setStatus('[error] ' + error.message); input.value = text; }
    else setStatus('');
  }
 
  async function deleteItem(id, li) {
    li.classList.add('removing');
    await new Promise(r => setTimeout(r, 150));
    const { error } = await client.from('items').delete().eq('id', id);
    if (error) { li.classList.remove('removing'); setStatus('[error] ' + error.message); }
  }
 
  // ÄNDERUNG 2: presence hinzugefügt (.subscribe() → async + track)
  function subscribeRealtime() {
    const myId = crypto.randomUUID();
    channel = client
      .channel('items-changes')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'items' }, ({ new: item }) => {
        const e = $('empty'); if (e) e.remove();
        const idx = $('list').children.length + 1;
        $('list').appendChild(makeRow(item, idx));
      })
      .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'items' }, ({ old: item }) => {
        const el = document.querySelector(`[data-id="${item.id}"]`);
        if (el) el.remove();
        if (!$('list').children.length)
          $('list').innerHTML = '<li id="empty">// keine einträge — <span>ersten eintrag hinzufügen ↑</span></li>';
        document.querySelectorAll('.item-index').forEach((el, i) => el.textContent = '#' + String(i+1).padStart(2,'0'));
      })
      .on('presence', { event: 'sync' }, () => {
        const count = Object.keys(channel.presenceState()).length;
        $('online-count').textContent = count;
      })
      .subscribe(async status => {
        if (status === 'SUBSCRIBED') {
          await channel.track({ user: myId });
        }
      });
  }
 
  function exportPDF() {
    window.print();
  }
 
  let _t;
  function setStatus(msg, ms = 2500) {
    $('status').textContent = msg;
    clearTimeout(_t);
    if (msg && ms) _t = setTimeout(() => $('status').textContent = '', ms);
  }
</script>

    </svg>
  </a>
 
  <button id="export-btn" onclick="exportPDF()" title="Als PDF exportieren">↓</button>
 
</body>
</html>
